<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- ヘッダー -->
    <header class="app-header">
      <h1 class="app-title">My TODO App</h1>
      <p class="app-subtitle">やることを管理しましょう</p>
    </header>

    <!-- メインコンテンツ -->
    <main class="app-main">
      <!-- タスク入力セクション -->
      <section class="input-section">
        <div class="input-wrapper">
          <input
            type="text"
            class="task-input"
            placeholder="新しいタスクを入力してください..."
            aria-label="タスク入力欄"
          >
          <button class="btn btn-add" aria-label="タスク追加ボタン">追加</button>
        </div>
      </section>

      <!-- タスク一覧セクション -->
      <section class="task-section">
        <h2 class="task-list-title">タスク一覧</h2>

        <ul class="task-list">
          <!-- タスク1: 未完了 -->
          <li class="task-item">
            <span class="task-text">買い物に行く</span>
            <div class="task-actions">
              <button class="btn btn-edit" title="編集">編集</button>
              <button class="btn btn-delete" title="削除">削除</button>
            </div>
          </li>

          <!-- タスク2: 完了済み -->
          <li class="task-item is-completed">
            <span class="task-text">メールを送る</span>
            <div class="task-actions">
              <button class="btn btn-edit" title="編集">編集</button>
              <button class="btn btn-delete" title="削除">削除</button>
            </div>
          </li>

          <!-- タスク3: 未完了 -->
          <li class="task-item">
            <span class="task-text">レポートを作成する</span>
            <div class="task-actions">
              <button class="btn btn-edit" title="編集">編集</button>
              <button class="btn btn-delete" title="削除">削除</button>
            </div>
          </li>

          <!-- タスク4: 完了済み -->
          <li class="task-item is-completed">
            <span class="task-text">プレゼンテーション資料を準備する</span>
            <div class="task-actions">
              <button class="btn btn-edit" title="編集">編集</button>
              <button class="btn btn-delete" title="削除">削除</button>
            </div>
          </li>

          <!-- タスク5: 未完了 -->
          <li class="task-item">
            <span class="task-text">チームメンバーに連絡する</span>
            <div class="task-actions">
              <button class="btn btn-edit" title="編集">編集</button>
              <button class="btn btn-delete" title="削除">削除</button>
            </div>
          </li>
        </ul>
      </section>
    </main>

    <!-- フッター -->
    <footer class="app-footer">
      <p class="footer-text">© 2024 My TODO App</p>
    </footer>
  </div>
</body>
</html>
